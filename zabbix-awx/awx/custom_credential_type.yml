# ===========================================================================
# Custom Credential Type para AWX
# Crear en: Administration > Credential Types > Add
# Luego crear una Credential de este tipo con la URL y el token, y asociarla
# al Job Template. AWX inyectará ZABBIX_URL y ZABBIX_TOKEN como variables
# de entorno del job (que es como los leen los scripts Python y el assert).
# ===========================================================================

# ----- INPUT CONFIGURATION -----
fields:
  - id: zabbix_url
    type: string
    label: Zabbix API URL
    help_text: "Ej: https://zabbix.empresa.com/api_jsonrpc.php"
  - id: zabbix_token
    type: string
    label: Zabbix API Token
    secret: true
required:
  - zabbix_url
  - zabbix_token

# ----- INJECTOR CONFIGURATION -----
env:
  ZABBIX_URL: "{{ zabbix_url }}"
  ZABBIX_TOKEN: "{{ zabbix_token }}"
