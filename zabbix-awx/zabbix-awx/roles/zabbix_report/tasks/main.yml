---
# ===========================================================================
# ROL zabbix_report  (orientado a AWX)
# expandir objetivos -> extraer (API) + gzip -> generar Excel -> publicar stats
# ===========================================================================

- name: Verificar credenciales de Zabbix (inyectadas por Custom Credential en AWX)
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', 'ZABBIX_URL') | length > 0
      - lookup('ansible.builtin.env', 'ZABBIX_TOKEN') | length > 0
    fail_msg: >-
      Faltan ZABBIX_URL / ZABBIX_TOKEN. En AWX, asocia la Custom Credential
      'Zabbix API' al Job Template (ver awx/custom_credential_type.yml).

# ---------------------------------------------------------------------------
# Normalizar la entrada según la encuesta usada:
#  - survey.json            -> entrada_usuario (texto "JD,PPS,10.0.0.99")
#  - survey_multiselect.json-> grupos_seleccionados (lista) + objetivos_extra (texto)
# Se unifican en una sola cadena 'entrada_efectiva'.
# ---------------------------------------------------------------------------
- name: Normalizar entrada (compatible con ambas encuestas)
  ansible.builtin.set_fact:
    entrada_efectiva: >-
      {{
        ( (grupos_seleccionados | default([])) +
          ( (objetivos_extra | default('')).split(',') | map('trim') | select() | list )
        ) | join(',')
        if (grupos_seleccionados is defined or objetivos_extra is defined)
        else entrada_usuario
      }}

# ---------------------------------------------------------------------------
# Expansión de la entrada (grupos JD/PPS/GP, IPs o nombres)
# Equivale al bloque 'objetivos_ordenados' del script original.
# ---------------------------------------------------------------------------
- name: Construir lista de objetivos preservando orden
  ansible.builtin.set_fact:
    objetivos_lista: >-
      {{
        objetivos_lista | default([]) +
        ( grupos_app[item | upper] if (item | upper) in grupos_app else [item] )
      }}
  loop: "{{ entrada_efectiva.split(',') | map('trim') | select() | list }}"

- name: Eliminar duplicados preservando orden
  ansible.builtin.set_fact:
    objetivos_final: "{{ objetivos_lista | unique | list }}"

- name: Mostrar objetivos resueltos
  ansible.builtin.debug:
    msg: "Objetivos a procesar ({{ objetivos_final | length }}): {{ objetivos_final | join(', ') }}"

- name: Crear directorio de salida
  ansible.builtin.file:
    path: "{{ dir_salida }}"
    state: directory
    mode: "0755"

- name: Calcular timestamp del run
  ansible.builtin.set_fact:
    ts_run: "{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"
    ruta_base: "{{ dir_salida }}/{{ nombre_base }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

- name: Copiar scripts Python al directorio de salida
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ dir_salida }}/{{ item }}"
    mode: "0755"
  loop:
    - extraer_zabbix.py
    - procesar_reporte.py

# ---------------------------------------------------------------------------
# ETAPA 1-3: API Zabbix + filtrado trend/history + JSON puro + gzip
# ---------------------------------------------------------------------------
- name: "Extraer datos crudos desde Zabbix (JSON puro + gzip)"
  ansible.builtin.command:
    cmd: >-
      python3 {{ dir_salida }}/extraer_zabbix.py
      --objetivos "{{ objetivos_final | join(',') }}"
      --grupos-json '{{ grupos_app | to_json }}'
      --fecha-inicio "{{ fecha_inicio }}"
      --fecha-fin "{{ fecha_fin }}"
      --salida "{{ ruta_base }}"
  register: extraccion
  changed_when: true

- name: Salida de la extracción
  ansible.builtin.debug:
    var: extraccion.stdout_lines

# ---------------------------------------------------------------------------
# ETAPA 4: JSON gzip -> Excel (datos + Summary)
# ---------------------------------------------------------------------------
- name: "Generar Excel desde el JSON comprimido"
  ansible.builtin.command:
    cmd: >-
      python3 {{ dir_salida }}/procesar_reporte.py
      --input "{{ ruta_base }}.json.gz"
      --output "{{ ruta_base }}.xlsx"
  register: generacion
  changed_when: true

- name: Resultado final
  ansible.builtin.debug:
    msg:
      - "{{ generacion.stdout }}"
      - "JSON puro: {{ ruta_base }}.json"
      - "JSON gzip: {{ ruta_base }}.json.gz"
      - "Excel:     {{ ruta_base }}.xlsx"

# ---------------------------------------------------------------------------
# Publicar rutas como artefactos del job (visibles en AWX y encadenables
# en un Workflow Template para un paso posterior de entrega).
# ---------------------------------------------------------------------------
- name: Publicar rutas de salida como artefactos de AWX
  ansible.builtin.set_stats:
    data:
      reporte_excel: "{{ ruta_base }}.xlsx"
      reporte_json: "{{ ruta_base }}.json"
      reporte_json_gz: "{{ ruta_base }}.json.gz"
      maquinas_procesadas: "{{ objetivos_final | length }}"
