---
- name: Asegurar permisos del home del usuario
  ansible.builtin.file:
    path: "{{ item.home | default('/home/' ~ item.username) }}"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.group | default(item.username) }}"
    mode: "{{ permisos.home_mode }}"
  loop: "{{ usuarios }}"
  when: item.state | default('present') == 'present'

- name: Asegurar permisos del directorio .ssh
  ansible.builtin.file:
    path: "{{ item.home | default('/home/' ~ item.username) }}/.ssh"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.group | default(item.username) }}"
    mode: "{{ permisos.ssh_dir_mode }}"
  loop: "{{ usuarios }}"
  when: item.state | default('present') == 'present'

- name: Asegurar permisos de authorized_keys
  ansible.builtin.file:
    path: "{{ item.home | default('/home/' ~ item.username) }}/.ssh/authorized_keys"
    state: file
    owner: "{{ item.username }}"
    group: "{{ item.group | default(item.username) }}"
    mode: "{{ permisos.authorized_keys_mode }}"
  loop: "{{ usuarios }}"
  when: item.state | default('present') == 'present'