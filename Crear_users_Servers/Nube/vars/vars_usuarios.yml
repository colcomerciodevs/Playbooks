---
usuarios:
  - username: seti_monitor
    group: seti_monitor
    comment: "Usuario de monitoreo Observabilidad SETI"
    shell_linux: /bin/bash
    shell_solaris: /usr/bin/bash
    home: /home/seti_monitor
    create_home: true
    state: present
    generar_llave: true
    key_comment: "seti_monitor@seti"

