---
usuarios:
  # ---------------------------------------------------------------------------
  # USUARIOS A CREAR
  # Perfil: solo lectura. Acceso por SSH/SCP a carpetas sobre las que ya
  # tienen permisos. Sin sudo ni privilegios administrativos.
  # ---------------------------------------------------------------------------

  - username: oalvarez
    #group: soporte
    comment: "Oscar Andres Alvarez Tabares"
    shell_linux: /bin/bash
    shell_solaris: /usr/bin/bash
    home: /home/oalvarez
    create_home: true
    state: present
    generar_llave: true
    #force_key: true        # ← regenera la llave aunque ya exista
    sudo: false

  - username: dgonzalez
    #group: soporte
    comment: "Daniela González Echavarría"
    shell_linux: /bin/bash
    shell_solaris: /usr/bin/bash
    home: /home/dgonzalez
    create_home: true
    state: present
    generar_llave: true
    #force_key: true        # ← regenera la llave aunque ya exista
    sudo: false

  # ---------------------------------------------------------------------------
  # EJEMPLOS DE REFERENCIA (comentados). Descomente y adapte si se requiere.
  # ---------------------------------------------------------------------------

  # Ejemplo A: usuario SIN sudo (solo lectura / acceso por SSH-SCP).
  # Comportamiento por defecto; sudo: false puede incluso omitirse.
  # - username: jlector
  #   group: soporte
  #   comment: "Usuario de solo lectura de ejemplo"
  #   shell_linux: /bin/bash
  #   shell_solaris: /usr/bin/bash
  #   home: /home/jlector
  #   create_home: true
  #   state: present
  #   generar_llave: true
  #   sudo: false

  # Ejemplo B: usuario con sudo COMPLETO sin pedir contraseña.
  # Recomendado cuando password_lock está activo (el usuario no tiene clave).
  # - username: jadmin
  #   group: administradores
  #   comment: "Usuario administrador de ejemplo"
  #   shell_linux: /bin/bash
  #   shell_solaris: /usr/bin/bash
  #   home: /home/jadmin
  #   create_home: true
  #   state: present
  #   generar_llave: true
  #   sudo: true
  #   sudo_nopasswd: true

  # Ejemplo C: usuario con sudo LIMITADO a comandos específicos.
  # sudo_commands ignora la política sudo_readonly y concede solo lo indicado.
  # - username: jmonitor
  #   comment: "Usuario de monitoreo de ejemplo"
  #   home: /home/jmonitor
  #   create_home: true
  #   state: present
  #   generar_llave: true
  #   sudo: true
  #   sudo_nopasswd: true
  #   sudo_commands:
  #     - /usr/bin/systemctl status *
  #     - /usr/bin/journalctl