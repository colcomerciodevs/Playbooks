---
- name: Detener servicios Windows con win_service
  hosts: Windows_JDA
  gather_facts: false

  vars:
    windows_services:
      - 'REFS (ALKWEBEMS)'
      - 'REFS (ALKWEBWMS)'

    stopped_services_file: 'C:\ProgramData\awx_jda_services_stopped.txt'

  tasks:

    - name: Limpiar archivo temporal de servicios detenidos previamente
      ansible.windows.win_file:
        path: "{{ stopped_services_file }}"
        state: absent

    - name: Consultar estado inicial de los servicios
      ansible.windows.win_service:
        name: "{{ item }}"
      loop: "{{ windows_services }}"
      register: service_info
      failed_when: false

    - name: Mostrar resumen de servicios evaluados
      ansible.builtin.debug:
        msg: >-
          Servicio '{{ item.item }}' en {{ inventory_hostname }}:
          {% if item.exists is not defined or not item.exists %}
          no existe en el sistema, se omite.
          {% elif item.state != 'running' %}
          estado actual '{{ item.state }}', no estaba RUNNING, se omite.
          {% else %}
          estado actual 'running', será detenido y marcado para reinicio.
          {% endif %}
      loop: "{{ service_info.results }}"

    - name: Guardar referencia solo de servicios que estaban RUNNING
      ansible.windows.win_shell: |
        Add-Content -Path "{{ stopped_services_file }}" -Value "{{ item.item }}"
      loop: "{{ service_info.results }}"
      when:
        - item.exists is defined
        - item.exists
        - item.state == 'running'
      changed_when: false

    - name: Detener solo servicios que estaban RUNNING
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: stopped
        force_dependent_services: true
      loop: "{{ service_info.results }}"
      when:
        - item.exists is defined
        - item.exists
        - item.state == 'running'

    - name: Validar que los servicios quedaron efectivamente STOPPED
      ansible.windows.win_service:
        name: "{{ item.item }}"
      loop: "{{ service_info.results }}"
      register: post_stop_info
      when:
        - item.exists is defined
        - item.exists
        - item.state == 'running'
      failed_when: >
        post_stop_info.state is defined and
        post_stop_info.state != 'stopped'

    - name: Mostrar estado final de servicios detenidos
      ansible.builtin.debug:
        msg: "Servicio '{{ item.item.item }}' en {{ inventory_hostname }}: estado final -> {{ item.state | default('no consultado') }}"
      loop: "{{ post_stop_info.results | default([]) }}"
      when: item.skipped is not defined or not item.skipped
