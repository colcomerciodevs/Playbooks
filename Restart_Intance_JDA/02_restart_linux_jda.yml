---
- name: Reiniciar servicios Linux JDA AKT NODO3
  hosts: Linux_JDA
  gather_facts: false
  remote_user: root

  vars:
    linux_wms_user: "alktstwms"
    linux_ems_user: "alktstems"

    mocaserver_log: "/app/jda/alktstwms/les/log/mocaserver.log"
    mocaserver_min_size: 40960
    mocaserver_timeout: 1200
    mocaserver_delay: 30

    kill_grace_seconds: 10      # espera tras rp stop antes de forzar
    kill_drain_seconds: 5       # espera entre SIGTERM y SIGKILL

  tasks:
    ###########################################################################
    # VALIDAR ESTADO WMS
    ###########################################################################

    - name: Validar estado WMS con rp status
      ansible.builtin.shell: |
        su - {{ linux_wms_user }} -c 'command -v rp >/dev/null 2>&1 && rp status'
      args:
        executable: /bin/bash
      register: wms_status
      changed_when: false
      failed_when: false

    - name: Definir si WMS está disponible y corriendo
      ansible.builtin.set_fact:
        wms_disponible: >-
          {{
            wms_status.rc == 0 and
            'not running' not in (wms_status.stdout | lower) and
            'not found' not in (wms_status.stderr | lower)
          }}

    - name: Mostrar estado WMS
      ansible.builtin.debug:
        msg: >-
          WMS {{ linux_wms_user }} en {{ inventory_hostname }}:
          {% if wms_disponible %}
          disponible y corriendo. Se ejecutará reinicio.
          {% else %}
          no disponible, no está corriendo o no existe rp. Se omite.
          {% endif %}

    ###########################################################################
    # VALIDAR ESTADO EMS
    ###########################################################################

    - name: Validar estado EMS con rp status
      ansible.builtin.shell: |
        su - {{ linux_ems_user }} -c 'command -v rp >/dev/null 2>&1 && rp status'
      args:
        executable: /bin/bash
      register: ems_status
      changed_when: false
      failed_when: false

    - name: Definir si EMS está disponible y corriendo
      ansible.builtin.set_fact:
        ems_disponible: >-
          {{
            ems_status.rc == 0 and
            'not running' not in (ems_status.stdout | lower) and
            'not found' not in (ems_status.stderr | lower)
          }}

    - name: Mostrar estado EMS
      ansible.builtin.debug:
        msg: >-
          EMS {{ linux_ems_user }} en {{ inventory_hostname }}:
          {% if ems_disponible %}
          disponible y corriendo. Se ejecutará reinicio.
          {% else %}
          no disponible, no está corriendo o no existe rp. Se omite.
          {% endif %}

    ###########################################################################
    # DETENER WMS SOLO SI ESTÁ DISPONIBLE
    ###########################################################################

    - name: Detener WMS como alktstwms (rp stop)
      ansible.builtin.shell: |
        su - {{ linux_wms_user }} -c 'rp stop'
      args:
        executable: /bin/bash
      when: wms_disponible
      changed_when: false
      failed_when: false

    - name: Esperar a que rp stop cierre (WMS)
      ansible.builtin.pause:
        seconds: "{{ kill_grace_seconds }}"
      when: wms_disponible

    - name: SIGTERM a procesos restantes del usuario WMS
      ansible.builtin.shell: "pkill -TERM -u {{ linux_wms_user }} || true"
      when: wms_disponible
      changed_when: false

    - name: Esperar drenaje WMS
      ansible.builtin.pause:
        seconds: "{{ kill_drain_seconds }}"
      when: wms_disponible

    - name: SIGKILL a lo que sobreviva (WMS)
      ansible.builtin.shell: "pkill -KILL -u {{ linux_wms_user }} || true"
      when: wms_disponible
      changed_when: false

    - name: Verificar procesos restantes del usuario WMS
      ansible.builtin.shell: "pgrep -u {{ linux_wms_user }} -l || true"
      register: wms_remaining
      changed_when: false
      when: wms_disponible

    - name: Mostrar procesos restantes WMS
      ansible.builtin.debug:
        msg: >-
          {% if (wms_remaining.stdout | trim) | length == 0 %}
          Sin procesos colgados de {{ linux_wms_user }}. Limpieza OK.
          {% else %}
          ATENCIÓN: siguen vivos procesos de {{ linux_wms_user }}:
          {{ wms_remaining.stdout_lines }}
          {% endif %}
      when: wms_disponible

    ###########################################################################
    # DETENER EMS SOLO SI ESTÁ DISPONIBLE
    ###########################################################################

    - name: Detener EMS como alktstems (rp stop)
      ansible.builtin.shell: |
        su - {{ linux_ems_user }} -c 'rp stop'
      args:
        executable: /bin/bash
      when: ems_disponible
      changed_when: false
      failed_when: false

    - name: Esperar a que rp stop cierre (EMS)
      ansible.builtin.pause:
        seconds: "{{ kill_grace_seconds }}"
      when: ems_disponible

    - name: SIGTERM a procesos restantes del usuario EMS
      ansible.builtin.shell: "pkill -TERM -u {{ linux_ems_user }} || true"
      when: ems_disponible
      changed_when: false

    - name: Esperar drenaje EMS
      ansible.builtin.pause:
        seconds: "{{ kill_drain_seconds }}"
      when: ems_disponible

    - name: SIGKILL a lo que sobreviva (EMS)
      ansible.builtin.shell: "pkill -KILL -u {{ linux_ems_user }} || true"
      when: ems_disponible
      changed_when: false

    - name: Verificar procesos restantes del usuario EMS
      ansible.builtin.shell: "pgrep -u {{ linux_ems_user }} -l || true"
      register: ems_remaining
      changed_when: false
      when: ems_disponible

    - name: Mostrar procesos restantes EMS
      ansible.builtin.debug:
        msg: >-
          {% if (ems_remaining.stdout | trim) | length == 0 %}
          Sin procesos colgados de {{ linux_ems_user }}. Limpieza OK.
          {% else %}
          ATENCIÓN: siguen vivos procesos de {{ linux_ems_user }}:
          {{ ems_remaining.stdout_lines }}
          {% endif %}
      when: ems_disponible

    ###########################################################################
    # INICIAR WMS SOLO SI ESTABA DISPONIBLE AL INICIO
    ###########################################################################

    - name: Iniciar WMS como alktstwms
      ansible.builtin.shell: |
        su - {{ linux_wms_user }} -c 'rp start'
      args:
        executable: /bin/bash
      register: wms_start
      changed_when: false
      when: wms_disponible

    - name: Mostrar salida de rp start (WMS)
      ansible.builtin.debug:
        var: wms_start.stdout_lines
      when: wms_disponible

    - name: Consultar estado WMS tras el arranque
      ansible.builtin.shell: |
        su - {{ linux_wms_user }} -c 'rp status'
      args:
        executable: /bin/bash
      register: wms_status_post
      changed_when: false
      failed_when: false
      when: wms_disponible

    - name: Mostrar estado WMS tras el arranque
      ansible.builtin.debug:
        var: wms_status_post.stdout_lines
      when: wms_disponible

    - name: Esperar a que mocaserver.log supere 40 KB
      ansible.builtin.stat:
        path: "{{ mocaserver_log }}"
      register: mocaserver_stat
      until: >
        mocaserver_stat.stat.exists and
        mocaserver_stat.stat.size | int > mocaserver_min_size
      retries: "{{ mocaserver_timeout // mocaserver_delay }}"
      delay: "{{ mocaserver_delay }}"
      when: wms_disponible

    - name: Mostrar tamaño final de mocaserver.log
      ansible.builtin.debug:
        msg: "El archivo {{ mocaserver_log }} superó los 40 KB. Tamaño actual: {{ mocaserver_stat.stat.size }} bytes."
      when: wms_disponible


    ###########################################################################
    # INICIAR EMS SOLO SI ESTABA DISPONIBLE AL INICIO
    ###########################################################################

    - name: Iniciar EMS como alktstems
      ansible.builtin.shell: |
        su - {{ linux_ems_user }} -c 'rp start'
      args:
        executable: /bin/bash
      register: ems_start
      changed_when: false
      when: ems_disponible

    - name: Mostrar salida de rp start (EMS)
      ansible.builtin.debug:
        var: ems_start.stdout_lines
      when: ems_disponible

    - name: Consultar estado EMS tras el arranque
      ansible.builtin.shell: |
        su - {{ linux_ems_user }} -c 'rp status'
      args:
        executable: /bin/bash
      register: ems_status_post
      changed_when: false
      failed_when: false
      when: ems_disponible

    - name: Mostrar estado EMS tras el arranque
      ansible.builtin.debug:
        var: ems_status_post.stdout_lines
      when: ems_disponible