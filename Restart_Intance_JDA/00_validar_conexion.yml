---
- name: 00 - Validar conectividad inicial del inventario
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Validar que exista el grupo Linux-JDA
      ansible.builtin.assert:
        that:
          - groups['Linux-JDA'] is defined
          - groups['Linux-JDA'] | length > 0
        fail_msg: "No existe el grupo Linux-JDA o no tiene hosts asociados en el inventario."
        success_msg: "Grupo Linux-JDA encontrado con hosts asociados."

    - name: Validar que exista el grupo Windows-JDA
      ansible.builtin.assert:
        that:
          - groups['Windows-JDA'] is defined
          - groups['Windows-JDA'] | length > 0
        fail_msg: "No existe el grupo Windows-JDA o no tiene hosts asociados en el inventario."
        success_msg: "Grupo Windows-JDA encontrado con hosts asociados."


- name: 00 - Validar conexión Linux JDA
  hosts: Linux-JDA
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Validar conexión SSH contra servidores Linux
      ansible.builtin.ping:
      register: resultado_ping_linux

    - name: Mostrar resultado conexión Linux
      ansible.builtin.debug:
        msg: "Conexión SSH OK contra {{ inventory_hostname }}"


- name: 00 - Validar conexión Windows JDA
  hosts: Windows-JDA
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Validar conexión WinRM contra servidores Windows
      ansible.windows.win_ping:
      register: resultado_ping_windows

    - name: Mostrar resultado conexión Windows
      ansible.builtin.debug:
        msg: "Conexión WinRM OK contra {{ inventory_hostname }}"