---
- name: Iniciar servicios Windows con win_service
  hosts: Windows_JDA
  gather_facts: false

  vars:
    stopped_services_file: 'C:\ProgramData\awx_jda_services_stopped.txt'

    # --- Validación del portal JDA ---
    portal_url: "https://prdn3jda.colcomercio.com.co/rp/login"
    portal_retries: 20            # 20 intentos
    portal_delay: 15              # 15s entre intentos (20 x 15s = 5 min máx)
    portal_error_string: "Invalid subsite"
    portal_validate_certs: false  # true si el certificado es válido/confiable

  tasks:

    - name: Validar si existe archivo de servicios detenidos
      ansible.windows.win_stat:
        path: "{{ stopped_services_file }}"
      register: stopped_file

    - name: Mostrar mensaje si no hay servicios para iniciar
      ansible.builtin.debug:
        msg: "No hay archivo de referencia o no se detuvo ningún servicio previamente en {{ inventory_hostname }}. Se omite inicio."
      when: not stopped_file.stat.exists

    - name: Leer servicios que fueron detenidos previamente
      ansible.windows.win_shell: |
        Get-Content "{{ stopped_services_file }}"
      register: stopped_services
      when: stopped_file.stat.exists
      changed_when: false

    - name: Consultar estado actual de los servicios a iniciar
      ansible.windows.win_service:
        name: "{{ item }}"
      loop: "{{ stopped_services.stdout_lines | default([]) }}"
      register: pre_start_info
      when:
        - stopped_file.stat.exists
        - item | length > 0
      failed_when: false

    - name: Mostrar estado previo al inicio de cada servicio
      ansible.builtin.debug:
        msg: >-
          Servicio '{{ item.item }}' en {{ inventory_hostname }}:
          {% if item.exists is not defined or not item.exists %}
          no existe en el sistema, se omite.
          {% else %}
          estado actual '{{ item.state }}', se procederá a iniciar.
          {% endif %}
      loop: "{{ pre_start_info.results | default([]) }}"
      when: item.skipped is not defined or not item.skipped

    - name: Iniciar solo servicios detenidos previamente
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: started
      loop: "{{ pre_start_info.results | default([]) }}"
      when:
        - stopped_file.stat.exists
        - item.skipped is not defined or not item.skipped
        - item.exists is defined
        - item.exists
        - item.state != 'running'

    - name: Validar que los servicios quedaron efectivamente RUNNING
      ansible.windows.win_service:
        name: "{{ item.item }}"
      loop: "{{ pre_start_info.results | default([]) }}"
      register: post_start_info
      when:
        - stopped_file.stat.exists
        - item.skipped is not defined or not item.skipped
        - item.exists is defined
        - item.exists
      failed_when: >
        post_start_info.state is defined and
        post_start_info.state != 'running'

    - name: Mostrar estado final de servicios iniciados
      ansible.builtin.debug:
        msg: "Servicio '{{ item.item.item }}' en {{ inventory_hostname }}: estado final -> {{ item.state | default('no consultado') }}"
      loop: "{{ post_start_info.results | default([]) }}"
      when: item.skipped is not defined or not item.skipped

    ###########################################################################
    # VALIDAR DISPONIBILIDAD DEL PORTAL JDA (solo si se iniciaron servicios)
    ###########################################################################

    - name: Esperar a que el portal JDA responda correctamente
      ansible.windows.win_uri:
        url: "{{ portal_url }}"
        method: GET
        status_code: 200
        validate_certs: "{{ portal_validate_certs }}"
        return_content: true
      register: portal_check
      until:
        - portal_check.status_code == 200
        - portal_error_string not in (portal_check.content | default(''))
      retries: "{{ portal_retries }}"
      delay: "{{ portal_delay }}"
      failed_when: false   # no aborta en el primer fallo; se evalúa más abajo
      when: stopped_file.stat.exists

    - name: Reportar resultado de la validación del portal
      ansible.builtin.debug:
        msg: >-
          Portal en {{ inventory_hostname }}:
          {% if portal_check.status_code is defined and portal_check.status_code == 200
                and portal_error_string not in (portal_check.content | default('')) %}
          OK -> responde 200 y el subsite cargó correctamente.
          {% else %}
          ATENCIÓN -> status '{{ portal_check.status_code | default("sin respuesta") }}',
          el portal NO quedó disponible.
          {% endif %}
      when: stopped_file.stat.exists

    - name: Fallar el play si el portal nunca quedó disponible
      ansible.builtin.fail:
        msg: >-
          El portal sigue devolviendo error (posible '{{ portal_error_string }}')
          en {{ inventory_hostname }} tras {{ portal_retries }} intentos.
      when:
        - stopped_file.stat.exists
        - >
          portal_check.status_code is not defined or
          portal_check.status_code != 200 or
          (portal_error_string in (portal_check.content | default('')))

    ###########################################################################
    # LIMPIEZA
    ###########################################################################

    - name: Limpiar archivo temporal de servicios detenidos
      ansible.windows.win_file:
        path: "{{ stopped_services_file }}"
        state: absent
      when: stopped_file.stat.exists