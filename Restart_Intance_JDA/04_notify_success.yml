---
- name: Notificar finalización de reinicio JDA AKT NODO3
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Enviar notificación final a Teams
      ansible.builtin.uri:
        url: "{{ teams_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "Finalizó el reinicio del {{ nodo }} de {{ ambiente }} en Windows y Linux. Por favor validar servicios."
        status_code:
          - 200
          - 202